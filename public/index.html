<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Umerce - Place Your Order</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; color: #333; }

    header {
      background: linear-gradient(135deg, #ff6b35, #f7c59f);
      color: white;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -1px; }
    header p { font-size: 0.95rem; opacity: 0.9; }
    .cart-btn {
      background: white;
      color: #ff6b35;
      border: none;
      border-radius: 50px;
      padding: 0.6rem 1.4rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: transform 0.1s;
    }
    .cart-btn:hover { transform: scale(1.05); }
    .cart-count {
      background: #ff6b35;
      color: white;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }

    .categories {
      display: flex;
      gap: 0.75rem;
      padding: 1.25rem 2rem;
      overflow-x: auto;
      background: white;
      border-bottom: 1px solid #eee;
    }
    .cat-btn {
      background: #f0f0f0;
      border: 2px solid transparent;
      border-radius: 50px;
      padding: 0.5rem 1.2rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .cat-btn.active, .cat-btn:hover {
      background: #ff6b35;
      color: white;
      border-color: #ff6b35;
    }

    main { display: flex; gap: 1.5rem; padding: 1.5rem 2rem; max-width: 1400px; margin: 0 auto; }

    .menu-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
    }
    .menu-card {
      background: white;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }
    .menu-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
    .menu-emoji { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .menu-card h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.4rem; }
    .menu-card p { font-size: 0.85rem; color: #666; flex: 1; margin-bottom: 1rem; line-height: 1.4; }
    .menu-footer { display: flex; align-items: center; justify-content: space-between; }
    .price { font-size: 1.2rem; font-weight: 800; color: #ff6b35; }
    .add-btn {
      background: #ff6b35;
      color: white;
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
    }
    .add-btn:hover { background: #e55a25; transform: scale(1.1); }

    .cart-panel {
      width: 340px;
      background: white;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      position: sticky;
      top: 1.5rem;
      align-self: flex-start;
      max-height: calc(100vh - 120px);
      overflow-y: auto;
    }
    .cart-panel h2 { font-size: 1.3rem; font-weight: 800; margin-bottom: 1rem; border-bottom: 2px solid #f0f0f0; padding-bottom: 0.75rem; }
    .cart-empty { text-align: center; color: #aaa; padding: 2rem 0; font-size: 0.95rem; }
    .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid #f5f5f5; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-weight: 600; font-size: 0.9rem; }
    .cart-item-price { color: #ff6b35; font-size: 0.85rem; margin-top: 2px; }
    .qty-controls { display: flex; align-items: center; gap: 0.5rem; }
    .qty-btn {
      background: #f0f0f0;
      border: none;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .qty-btn:hover { background: #ff6b35; color: white; }
    .qty-num { font-weight: 700; min-width: 20px; text-align: center; }

    .name-input {
      width: 100%;
      padding: 0.65rem 1rem;
      border: 2px solid #eee;
      border-radius: 10px;
      font-size: 0.95rem;
      margin-top: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .name-input:focus { border-color: #ff6b35; }
    .cart-total { margin-top: 1rem; font-size: 1.1rem; font-weight: 700; display: flex; justify-content: space-between; }
    .order-btn {
      width: 100%;
      background: #ff6b35;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0.9rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 1rem;
      transition: background 0.2s;
    }
    .order-btn:hover { background: #e55a25; }
    .order-btn:disabled { background: #ccc; cursor: not-allowed; }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #333;
      color: white;
      padding: 0.8rem 1.8rem;
      border-radius: 50px;
      font-weight: 600;
      transition: transform 0.4s ease;
      z-index: 999;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 768px) {
      main { flex-direction: column; padding: 1rem; }
      .cart-panel { width: 100%; position: static; }
      header { flex-wrap: wrap; gap: 0.75rem; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Umerce 🔥</h1>
    <p>Fresh food, fast delivery</p>
  </div>
  <button class="cart-btn" onclick="scrollToCart()">
    🛒 Cart <span class="cart-count" id="cartCount">0</span>
  </button>
</header>

<div class="categories">
  <button class="cat-btn active" onclick="filterCategory('All', this)">All</button>
  <button class="cat-btn" onclick="filterCategory('Burgers', this)">🍔 Burgers</button>
  <button class="cat-btn" onclick="filterCategory('Pizza', this)">🍕 Pizza</button>
  <button class="cat-btn" onclick="filterCategory('Salads', this)">🥗 Salads</button>
  <button class="cat-btn" onclick="filterCategory('Drinks', this)">🥤 Drinks</button>
</div>

<main>
  <div class="menu-grid" id="menuGrid"></div>
  <div class="cart-panel" id="cartPanel">
    <h2>Your Order</h2>
    <div id="cartItems"><p class="cart-empty">Your cart is empty 🛒</p></div>
    <input class="name-input" type="text" id="customerName" placeholder="Your name (optional)" />
    <div class="cart-total"><span>Total:</span><span id="cartTotal">$0.00</span></div>
    <button class="order-btn" id="orderBtn" onclick="placeOrder()" disabled>Place Order</button>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  let menuItems = [];
  let cart = [];
  let currentCategory = 'All';

  async function loadMenu() {
    const res = await fetch('/api/menu');
    menuItems = await res.json();
    renderMenu();
  }

  function filterCategory(cat, btn) {
    currentCategory = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderMenu();
  }

  function renderMenu() {
    const grid = document.getElementById('menuGrid');
    const filtered = currentCategory === 'All' ? menuItems : menuItems.filter(i => i.category === currentCategory);
    grid.innerHTML = filtered.map(item => `
      <div class="menu-card">
        <div class="menu-emoji">${item.emoji}</div>
        <h3>${item.name}</h3>
        <p>${item.description}</p>
        <div class="menu-footer">
          <span class="price">$${item.price.toFixed(2)}</span>
          <button class="add-btn" onclick="addToCart(${item.id})">+</button>
        </div>
      </div>
    `).join('');
  }

  function addToCart(id) {
    const item = menuItems.find(i => i.id === id);
    const existing = cart.find(i => i.id === id);
    if (existing) {
      existing.quantity++;
    } else {
      cart.push({ ...item, quantity: 1 });
    }
    renderCart();
    showToast(`${item.name} added to cart!`);
  }

  function changeQty(id, delta) {
    const idx = cart.findIndex(i => i.id === id);
    if (idx === -1) return;
    cart[idx].quantity += delta;
    if (cart[idx].quantity <= 0) cart.splice(idx, 1);
    renderCart();
  }

  function renderCart() {
    const container = document.getElementById('cartItems');
    const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
    const count = cart.reduce((s, i) => s + i.quantity, 0);
    document.getElementById('cartCount').textContent = count;
    document.getElementById('cartTotal').textContent = '$' + total.toFixed(2);
    document.getElementById('orderBtn').disabled = cart.length === 0;

    if (cart.length === 0) {
      container.innerHTML = '<p class="cart-empty">Your cart is empty 🛒</p>';
      return;
    }
    container.innerHTML = cart.map(item => `
      <div class="cart-item">
        <div class="cart-item-info">
          <div class="cart-item-name">${item.emoji} ${item.name}</div>
          <div class="cart-item-price">$${(item.price * item.quantity).toFixed(2)}</div>
        </div>
        <div class="qty-controls">
          <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
          <span class="qty-num">${item.quantity}</span>
          <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
        </div>
      </div>
    `).join('');
  }

  async function placeOrder() {
    const customerName = document.getElementById('customerName').value.trim() || 'Guest';
    const res = await fetch('/api/orders', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items: cart, customerName })
    });
    if (res.ok) {
      const order = await res.json();
      cart = [];
      renderCart();
      document.getElementById('customerName').value = '';
      showToast(`Order #${order.id} placed! Thank you, ${order.customerName}! 🎉`);
    } else {
      showToast('Something went wrong. Please try again.');
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function scrollToCart() {
    document.getElementById('cartPanel').scrollIntoView({ behavior: 'smooth' });
  }

  loadMenu();
</script>
</body>
</html>
